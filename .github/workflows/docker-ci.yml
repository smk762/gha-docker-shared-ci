name: docker-ci (reusable)

on:
  workflow_call:
    inputs:
      image:
        description: "Docker image name (e.g. username/repo)"
        required: true
        type: string
      context:
        description: "Build context"
        required: false
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "Dockerfile"
        type: string
      platforms:
        description: "Buildx platforms"
        required: false
        default: "linux/amd64"
        type: string
      compose_files:
        description: "Space-separated list of compose files to validate (optional)"
        required: false
        default: ""
        type: string
      build_args:
        description: "Optional newline-separated build args: KEY=VALUE"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dockerfile lint (hadolint)
        uses: ./.github/actions/dockerfile-lint
        with:
          dockerfile: ${{ inputs.dockerfile }}

      - name: Validate compose (optional)
        if: ${{ inputs.compose_files != '' }}
        uses: ./.github/actions/compose-validate
        with:
          files: ${{ inputs.compose_files }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: false
          load: true
          tags: ${{ inputs.image }}:ci-${{ github.sha }}
          build-args: ${{ inputs.build_args }}
